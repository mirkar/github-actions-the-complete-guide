name: Deploy To Lower Environment
run-name: Deploying to ${{ inputs.environment }}
on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        description: 'Target environment'
        type: choice
        options: [SBX, ADT]

# Global permissions
permissions:
  checks: write
  contents: read # Required to checkout the repository code

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: ./${{ vars.PROJECT_DIRECTORY }}

      - name: Run Unit Tests
        run: npm run test:once
        working-directory: ./${{ vars.PROJECT_DIRECTORY }}

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: always() # Ensures the report is published even if tests fail
        with:
          report_paths: '**/junit.xml'

      - name: Code Coverage Summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: '**/cobertura-coverage.xml'
          badge: true
          format: markdown
          output: file

      - name: Add Coverage PR Comment
        # Changed extension from .markdown to .md
        run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

      - name: Build Application
        run: |
          npm run build
          tree dist
        working-directory: ./${{ vars.PROJECT_DIRECTORY }} 

      - name: Deploy to ${{ inputs.environment }}
        run: |
          echo -e "\033[1;33mDeploying to ${{ inputs.environment }} environment...\033[0m"
          # Add your deployment commands here, e.g., using Azure CLI, AWS CLI, etc.
          # Example for Azure CLI:
          # az webapp deploy --name my-app --resource-group my-resource-group --src-path               