name: Validate PR Title
on:
  pull_request:
    branches: [ main ]
# on:
#   pull_request:
#     types: [opened, edited, synchronize]

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Regex Check
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const regex = /^(feat|fix|docs|style|refactor|test|chore)(\(.+\))?: .{1,50}/;
            if (!regex.test(title)) {
              core.setFailed(`Invalid PR title: "${title}". Must match Conventional Commits format.`);
            }